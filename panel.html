<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; padding: 20px; font-size: 13px; }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .brand-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #3b82f6, #6366f1); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 12px; }
  .brand-name { font-size: 14px; font-weight: 700; }
  .brand-sub { font-size: 10px; color: #94a3b8; }
  .badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; background: #eff6ff; color: #3b82f6; margin-left: 6px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field textarea { width: 100%; height: 200px; padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 10px; font-family: monospace; background: #fff; resize: vertical; line-height: 1.4; }
  .field textarea:focus { outline: none; border-color: #3b82f6; }
  .field input { width: 100%; padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 12px; background: #fff; }
  .action-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; margin-top: 6px; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress-wrap { margin-top: 10px; display: none; }
  .progress-wrap.on { display: block; }
  .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .progress-label { font-size: 10px; color: #64748b; margin-top: 4px; }
  .toast { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 11px; display: none; }
  .toast.ok { display: block; background: #dcfce7; color: #166534; }
  .toast.err { display: block; background: #fef2f2; color: #991b1b; }
  /* ваївЇћвДЂВџЕ ВѕеЖ▓еВДё iframe */
  #renderFrame { position: absolute; left: -9999px; top: 0; width: 860px; height: 100px; border: none; visibility: hidden; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">A</div>
  <span class="brand-name">ВЁђвЪгвЊцВЮў ВЋёВДђьіИ</span>
  <span class="brand-sub">вћћВъљВЮ┤вёѕ</span>
  <span class="badge">HTML to Figma</span>
</div>

<div class="field">
  <label>ьћёвАюВаЮьіИ ВЮ┤вдё</label>
  <input type="text" id="titleBox" placeholder="ВЃЂВёИьјўВЮ┤ВДђ ВЮ┤вдё (ВёаьЃЮ)">
</div>

<div class="field">
  <label>HTML ВйћвЊю</label>
  <textarea id="htmlBox" placeholder="ВЏ╣ в╣ївЇћВЌљВёю HTML в│хВѓг в▓ёьі╝ВЮё вѕївЪг в│хВѓгьЋю ВйћвЊювЦ╝ ВЌгЖИ░ВЌљ вХЎВЌгвёБВю╝ВёИВџћ"></textarea>
</div>

<button class="action-btn" id="btnImport" onclick="doImport()">FigmaВЌљ ВЃЮВё▒</button>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>
<div id="toast" class="toast"></div>

<!-- ВѕеЖ▓еВДё iframe: HTMLВЮё ВІцВаю ваївЇћвДЂьЋўЖ│а getComputedStyleвАю ВЮйЖИ░ -->
<iframe id="renderFrame"></iframe>

<script>
function showToast(t, m) { var e = document.getElementById('toast'); e.className = 'toast ' + t; e.textContent = m; }
function showProgress(s, p) { document.getElementById('progressWrap').classList.add('on'); document.getElementById('progressFill').style.width = p + '%'; document.getElementById('progressLabel').textContent = s; }
function hideProgress() { document.getElementById('progressWrap').classList.remove('on'); }

function doImport() {
  var html = document.getElementById('htmlBox').value.trim();
  var title = document.getElementById('titleBox').value.trim() || 'ВЃЂВёИьјўВЮ┤ВДђ';
  if (!html) { showToast('err', 'HTMLВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ'); return; }

  showProgress('ваївЇћвДЂ ВцЉ...', 5);
  document.getElementById('btnImport').disabled = true;

  // iframeВЌљ HTMLВЮё ваївЇћвДЂ
  var iframe = document.getElementById('renderFrame');
  var fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;}</style></head><body>' + html + '</body></html>';

  iframe.onload = function() {
    try {
      showProgress('DOM вХёВёЮ ВцЉ...', 20);
      var doc = iframe.contentDocument || iframe.contentWindow.document;
      var body = doc.body;

      // DOM Рєњ Figma вЁИвЊю ьіИвдг в│ђьЎў
      var nodes = traverseDOM(body, doc);

      showProgress('FigmaВЌљ ВаёВєА ВцЉ...', 80);
      parent.postMessage({ pluginMessage: { type: 'import-rendered', nodes: nodes, title: title } }, '*');
    } catch(e) {
      showToast('err', 'в│ђьЎў ВІцьїе: ' + e.message);
      document.getElementById('btnImport').disabled = false;
      hideProgress();
    }
  };

  // iframeВЌљ HTML ВЊ░ЖИ░
  iframe.srcdoc = fullHtml;
}

// DOM ВъгЖиђ Вѕюьџї Рєњ вЁИвЊю ьіИвдг ВЃЮВё▒
function traverseDOM(el, doc) {
  var result = [];
  var children = el.children;

  for (var i = 0; i < children.length; i++) {
    var child = children[i];
    var tag = child.tagName.toLowerCase();

    // вг┤ВІюьЋа ьЃюЖиИ
    if (tag === 'style' || tag === 'script' || tag === 'meta' || tag === 'link') continue;
    if (child.getAttribute('data-element-toolbar') || child.getAttribute('data-resize-handle')) continue;

    var cs = window.getComputedStyle(child);
    var rect = child.getBoundingClientRect();

    // в│┤ВЮ┤ВДђ ВЋівіћ ВџћВєї вг┤ВІю
    if (cs.display === 'none' || cs.visibility === 'hidden' || rect.width === 0) continue;

    var node = {
      tag: tag,
      // ВюёВ╣ўВЎђ ьЂгЖИ░ (ВаЋьЎЋьЋю ваївЇћвДЂ Ж▓░Ж│╝)
      x: Math.round(rect.left),
      y: Math.round(rect.top),
      w: Math.round(rect.width),
      h: Math.round(rect.height),
      // ВіцьЃђВЮ╝ (getComputedStyle Рђћ ВІцВаю Ж│ёВѓ░Ж░њ)
      bg: rgbToHex(cs.backgroundColor),
      color: rgbToHex(cs.color),
      fontSize: parseFloat(cs.fontSize),
      fontWeight: parseInt(cs.fontWeight) || 400,
      textAlign: cs.textAlign,
      lineHeight: parseFloat(cs.lineHeight) || parseFloat(cs.fontSize) * 1.5,
      letterSpacing: parseFloat(cs.letterSpacing) || 0,
      borderRadius: parseFloat(cs.borderRadius) || 0,
      opacity: parseFloat(cs.opacity),
      // ьїевћЕ
      paddingTop: parseFloat(cs.paddingTop) || 0,
      paddingRight: parseFloat(cs.paddingRight) || 0,
      paddingBottom: parseFloat(cs.paddingBottom) || 0,
      paddingLeft: parseFloat(cs.paddingLeft) || 0,
      // ваѕВЮ┤ВЋёВЏЃ
      display: cs.display,
      flexDirection: cs.flexDirection,
      gap: parseFloat(cs.gap) || 0,
      alignItems: cs.alignItems,
      justifyContent: cs.justifyContent,
      // ВЮ┤в»ИВДђ
      src: tag === 'img' ? child.getAttribute('src') : null,
      alt: tag === 'img' ? (child.getAttribute('alt') || '') : null,
      // ьЁЇВіцьіИ (ВДЂВаЉ ьЁЇВіцьіИвДї, ВъљВІЮ ьЃюЖиИ ьЁЇВіцьіИ ВаюВЎИ)
      text: getDirectTextContent(child),
      // ВъљВІЮ вЁИвЊю (ВъгЖиђ)
      children: traverseDOM(child, doc)
    };

    result.push(node);
  }

  return result;
}

// ВДЂВаЉ ьЁЇВіцьіИвДї ВХћВХю (ВъљВІЮ ьЃюЖиИВЮў ьЁЇВіцьіИ ВаюВЎИ)
function getDirectTextContent(el) {
  var text = '';
  for (var i = 0; i < el.childNodes.length; i++) {
    if (el.childNodes[i].nodeType === 3) { // TEXT_NODE
      text += el.childNodes[i].textContent;
    }
  }
  return text.trim();
}

// rgb(r,g,b) Рєњ #hex в│ђьЎў
function rgbToHex(rgb) {
  if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return '';
  var m = rgb.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if (!m) return '';
  return '#' + ((1 << 24) + (parseInt(m[1]) << 16) + (parseInt(m[2]) << 8) + parseInt(m[3])).toString(16).slice(1);
}

// вЕћВІюВДђ ВѕўВІа
window.addEventListener('message', function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'progress') showProgress(msg.step, msg.percent);
  if (msg.type === 'done') {
    hideProgress();
    showToast('ok', msg.count + 'Ж░ю вЁИвЊюЖ░ђ ВЃЮВё▒вљўВЌѕВіхвІѕвІц!');
    document.getElementById('btnImport').disabled = false;
  }
  if (msg.type === 'fail') {
    hideProgress();
    showToast('err', msg.message);
    document.getElementById('btnImport').disabled = false;
  }
});
</script>
</body>
</html>
