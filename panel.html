<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8fafc; color: #0f172a; padding: 20px; font-size: 13px;
  }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .brand-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #3b82f6, #6366f1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 14px; }
  .brand-name { font-size: 15px; font-weight: 700; color: #0f172a; }
  .brand-sub { font-size: 11px; color: #94a3b8; margin-left: 4px; }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field textarea {
    width: 100%; height: 320px; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace; background: #fff;
    transition: border 0.15s; line-height: 1.5; resize: vertical;
  }
  .field textarea:focus { outline: none; border-color: #3b82f6; }
  .field input {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 13px; background: #fff; margin-bottom: 8px;
  }
  .field input:focus { outline: none; border-color: #3b82f6; }

  .action-btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; margin-top: 8px;
    background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff;
  }
  .action-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .progress-wrap { margin-top: 14px; display: none; }
  .progress-wrap.on { display: block; }
  .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 3px; transition: width 0.3s; width: 0%; }
  .progress-label { font-size: 11px; color: #64748b; margin-top: 6px; }

  .toast { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 12px; display: none; }
  .toast.ok { display: block; background: #dcfce7; color: #166534; }
  .toast.err { display: block; background: #fef2f2; color: #991b1b; }

  .guide { margin-top: 18px; padding: 14px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px; line-height: 1.8; }
  .guide h4 { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: #0f172a; }
  .guide ol { padding-left: 18px; color: #475569; font-size: 12px; }
  .guide a { color: #3b82f6; text-decoration: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; background: #eff6ff; color: #3b82f6; margin-left: 6px; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">A</div>
  <span class="brand-name">셀러들의 아지트</span>
  <span class="brand-sub">디자이너</span>
  <span class="badge">HTML to Figma</span>
</div>

<div class="field">
  <label>프로젝트 이름</label>
  <input type="text" id="titleBox" placeholder="상세페이지 이름 (선택)" value="">
</div>

<div class="field">
  <label>HTML 코드</label>
  <textarea id="htmlBox" placeholder="웹 빌더에서 HTML 버튼을 눌러 복사한 코드를 여기에 붙여넣으세요"></textarea>
</div>

<button class="action-btn" id="btnImport" onclick="doImport()">Figma에 생성</button>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div id="toast" class="toast"></div>

<div class="guide">
  <h4>사용법</h4>
  <ol>
    <li><a href="https://designer.sellerazit.com" target="_blank">designer.sellerazit.com</a>에서 상세페이지 만들기</li>
    <li>에디터 상단의 <strong>HTML</strong> 버튼 클릭 → 전체 코드 복사</li>
    <li>여기에 붙여넣기 → <strong>Figma에 생성</strong> 클릭</li>
  </ol>
</div>

<script>
function showToast(type, msg) {
  var el = document.getElementById('toast');
  el.className = 'toast ' + type;
  el.textContent = msg;
}

function showProgress(step, pct) {
  document.getElementById('progressWrap').classList.add('on');
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = step;
}

function hideProgress() {
  document.getElementById('progressWrap').classList.remove('on');
}

function doImport() {
  var html = document.getElementById('htmlBox').value.trim();
  var title = document.getElementById('titleBox').value.trim();
  if (!html) { showToast('err', 'HTML 코드를 입력해주세요'); return; }
  if (html.indexOf('data-section-type') === -1) {
    showToast('err', '셀러들의 아지트 디자이너에서 만든 HTML이 아닌 것 같습니다');
    return;
  }
  showProgress('준비 중...', 5);
  document.getElementById('btnImport').disabled = true;
  parent.postMessage({ pluginMessage: { type: 'import-html', html: html, title: title || '상세페이지' } }, '*');
}

window.addEventListener('message', function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'progress') showProgress(msg.step, msg.percent);
  if (msg.type === 'done') {
    hideProgress();
    showToast('ok', msg.count + '개 섹션이 생성되었습니다!');
    document.getElementById('btnImport').disabled = false;
  }
  if (msg.type === 'fail') {
    hideProgress();
    showToast('err', msg.message);
    document.getElementById('btnImport').disabled = false;
  }
});
</script>
</body>
</html>
