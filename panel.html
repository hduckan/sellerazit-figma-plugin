<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #0f172a; padding: 20px; font-size: 13px; }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .brand-icon { width: 24px; height: 24px; background: linear-gradient(135deg, #3b82f6, #6366f1); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 12px; }
  .brand-name { font-size: 14px; font-weight: 700; }
  .brand-sub { font-size: 10px; color: #94a3b8; }
  .badge { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; background: #eff6ff; color: #3b82f6; margin-left: 6px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 10px; font-weight: 600; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .field textarea { width: 100%; height: 280px; padding: 8px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 10px; font-family: monospace; background: #fff; resize: vertical; line-height: 1.4; }
  .field textarea:focus { outline: none; border-color: #3b82f6; }
  .action-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; margin-top: 6px; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress-wrap { margin-top: 10px; display: none; }
  .progress-wrap.on { display: block; }
  .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .progress-label { font-size: 10px; color: #64748b; margin-top: 4px; }
  .toast { margin-top: 8px; padding: 8px 10px; border-radius: 6px; font-size: 11px; display: none; }
  .toast.ok { display: block; background: #dcfce7; color: #166534; }
  .toast.err { display: block; background: #fef2f2; color: #991b1b; }
  .guide { margin-top: 12px; padding: 12px; background: #fff; border: 1.5px solid #e2e8f0; border-radius: 10px; line-height: 1.7; font-size: 11px; color: #475569; }
  .guide h4 { font-size: 11px; font-weight: 700; margin-bottom: 4px; color: #0f172a; }
  .guide ol { padding-left: 16px; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">A</div>
  <span class="brand-name">셀러들의 아지트</span>
  <span class="brand-sub">디자이너</span>
  <span class="badge">HTML to Figma v4</span>
</div>

<div class="field">
  <label>서버 렌더링 JSON (Figma JSON 버튼으로 복사한 내용)</label>
  <textarea id="jsonBox" placeholder="웹 빌더에서 'Figma JSON' 버튼을 클릭하면 서버에서 렌더링한 정확한 데이터가 복사됩니다. 여기에 Ctrl+V로 붙여넣으세요."></textarea>
</div>

<button class="action-btn" id="btnImport" onclick="doImport()">Figma에 생성</button>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>
<div id="toast" class="toast"></div>

<div class="guide">
  <h4>사용법</h4>
  <ol>
    <li>웹 에디터에서 <strong>이미지 내보내기 ▾ → Figma JSON</strong> 클릭</li>
    <li>서버에서 렌더링된 JSON이 클립보드에 복사됩니다</li>
    <li>여기에 <strong>Ctrl+V</strong>로 붙여넣기 → <strong>Figma에 생성</strong></li>
  </ol>
</div>

<script>
function showToast(t, m) { var e = document.getElementById('toast'); e.className = 'toast ' + t; e.textContent = m; }
function showProgress(s, p) { document.getElementById('progressWrap').classList.add('on'); document.getElementById('progressFill').style.width = p + '%'; document.getElementById('progressLabel').textContent = s; }
function hideProgress() { document.getElementById('progressWrap').classList.remove('on'); }

function doImport() {
  var raw = document.getElementById('jsonBox').value.trim();
  if (!raw) { showToast('err', 'JSON을 입력해주세요'); return; }
  try {
    var data = JSON.parse(raw);
    if (data.type !== 'SELLERAZIT_RENDERED') {
      showToast('err', '서버 렌더링 JSON이 아닙니다. 웹에서 Figma JSON 버튼을 클릭해주세요.');
      return;
    }
    showProgress('Figma에 전송 중...', 10);
    document.getElementById('btnImport').disabled = true;
    parent.postMessage({ pluginMessage: { type: 'import-rendered', nodes: data.nodes, title: data.title } }, '*');
  } catch(e) {
    showToast('err', 'JSON 형식 오류: ' + e.message);
  }
}

window.addEventListener('message', function(e) {
  var msg = e.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'progress') showProgress(msg.step, msg.percent);
  if (msg.type === 'done') {
    hideProgress();
    showToast('ok', msg.count + '개 노드가 생성되었습니다!');
    document.getElementById('btnImport').disabled = false;
  }
  if (msg.type === 'fail') {
    hideProgress();
    showToast('err', msg.message);
    document.getElementById('btnImport').disabled = false;
  }
});
</script>
</body>
</html>
