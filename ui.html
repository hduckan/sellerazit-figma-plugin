<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fafafa; color: #111827; padding: 20px;
  }
  .header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
  }
  .header .logo {
    font-size: 18px; font-weight: 800; color: #3b82f6;
  }
  .header .title {
    font-size: 15px; font-weight: 700; color: #111827;
  }
  .header .sub {
    font-size: 11px; color: #9ca3af;
  }
  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
  }
  .tab {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #6b7280;
  }
  .tab.active {
    background: #3b82f6; color: #fff; border-color: #3b82f6;
  }
  .section {
    display: none;
  }
  .section.active {
    display: block;
  }
  textarea {
    width: 100%; height: 280px; padding: 12px; border: 1px solid #d1d5db;
    border-radius: 10px; font-size: 12px; font-family: monospace;
    resize: vertical; line-height: 1.5; background: #fff;
  }
  textarea:focus {
    outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }
  .url-input {
    width: 100%; padding: 10px 14px; border: 1px solid #d1d5db;
    border-radius: 10px; font-size: 13px; background: #fff; margin-bottom: 12px;
  }
  .url-input:focus {
    outline: none; border-color: #3b82f6;
  }
  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 12px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: #3b82f6; color: #fff;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
  .btn-outline {
    background: #fff; color: #374151; border: 1px solid #d1d5db;
  }
  .btn-outline:hover { background: #f3f4f6; }
  .status {
    margin-top: 12px; padding: 10px 14px; border-radius: 8px;
    font-size: 12px; display: none;
  }
  .status.success { display: block; background: #dcfce7; color: #15803d; }
  .status.error { display: block; background: #fef2f2; color: #dc2626; }
  .status.loading { display: block; background: #eff6ff; color: #2563eb; }
  .help {
    margin-top: 16px; padding: 14px; background: #fff; border: 1px solid #e5e7eb;
    border-radius: 10px; font-size: 12px; color: #6b7280; line-height: 1.7;
  }
  .help strong { color: #111827; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">A</span>
  <span class="title">셀러들의 아지트</span>
  <span class="sub">디자이너</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('url')">URL로 가져오기</div>
  <div class="tab" onclick="switchTab('paste')">JSON 붙여넣기</div>
</div>

<!-- URL로 가져오기 -->
<div id="tab-url" class="section active">
  <input type="text" class="url-input" id="jsonUrl"
    placeholder="상세페이지 JSON URL을 입력하세요"
    value="">
  <button class="btn btn-primary" id="btnFetchUrl" onclick="fetchFromUrl()">
    가져와서 생성하기
  </button>
</div>

<!-- JSON 붙여넣기 -->
<div id="tab-paste" class="section">
  <textarea id="jsonInput" placeholder='셀러아지트 디자이너에서 복사한 JSON을 여기에 붙여넣으세요...'></textarea>
  <button class="btn btn-primary" id="btnGenerate" onclick="generateLayout()">
    Figma에 생성하기
  </button>
</div>

<div id="status" class="status"></div>

<div class="help">
  <strong>사용 방법:</strong><br>
  1. 셀러아지트 디자이너(designer.sellerazit.com)에서 상세페이지 완성<br>
  2. "이미지 내보내기 ▾" → "Figma JSON" 클릭<br>
  3. 다운로드된 JSON 파일의 내용을 여기에 붙여넣기<br>
  4. "Figma에 생성하기" 클릭<br><br>
  <strong>또는</strong> URL 탭에서 직접 API URL을 입력하면 자동으로 가져옵니다.
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  if (tab === 'url') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('tab-url').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('tab-paste').classList.add('active');
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function generateLayout() {
  const input = document.getElementById('jsonInput').value.trim();
  if (!input) { showStatus('error', 'JSON을 입력해주세요.'); return; }
  try {
    const data = JSON.parse(input);
    showStatus('loading', 'Figma에 레이아웃을 생성하는 중...');
    document.getElementById('btnGenerate').disabled = true;
    parent.postMessage({ pluginMessage: { type: 'create-layout', data } }, '*');
  } catch (e) {
    showStatus('error', 'JSON 형식이 올바르지 않습니다: ' + e.message);
  }
}

async function fetchFromUrl() {
  const url = document.getElementById('jsonUrl').value.trim();
  if (!url) { showStatus('error', 'URL을 입력해주세요.'); return; }
  showStatus('loading', 'JSON을 가져오는 중...');
  document.getElementById('btnFetchUrl').disabled = true;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    showStatus('loading', 'Figma에 레이아웃을 생성하는 중...');
    parent.postMessage({ pluginMessage: { type: 'create-layout', data } }, '*');
  } catch (e) {
    showStatus('error', '가져오기 실패: ' + e.message);
    document.getElementById('btnFetchUrl').disabled = false;
  }
}

// URL 파라미터에서 자동 가져오기 (웹에서 열 때)
window.addEventListener('message', (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'success') {
    showStatus('success', msg.sections + '개 섹션이 Figma에 생성되었습니다!');
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('btnFetchUrl').disabled = false;
  }
  if (msg.type === 'error') {
    showStatus('error', '생성 실패: ' + msg.message);
    document.getElementById('btnGenerate').disabled = false;
    document.getElementById('btnFetchUrl').disabled = false;
  }
});

// 클립보드에서 자동 읽기 시도
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const text = await navigator.clipboard.readText();
    if (text && text.includes('"CREATE_LAYOUT"')) {
      document.querySelectorAll('.tab')[1].click();
      document.getElementById('jsonInput').value = text;
      showStatus('success', '클립보드에서 JSON을 자동으로 가져왔습니다. "Figma에 생성하기"를 클릭하세요.');
    }
  } catch {}
});
</script>
</body>
</html>
